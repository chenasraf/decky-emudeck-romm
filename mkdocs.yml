site_name: EmuDeck RomM Sync
site_description: EmuDeck-focused fork of decky-romm-sync — sync your self-hosted RomM library into your Steam Deck
site_url: https://chenasraf.github.io/decky-emudeck-romm/

repo_url: https://github.com/chenasraf/decky-emudeck-romm
repo_name: chenasraf/decky-emudeck-romm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Configuration: user-guide/configuration.md
      - Syncing Your Library: user-guide/syncing-your-library.md
      - Managing Games: user-guide/managing-games.md
      - BIOS Management: user-guide/bios-management.md
      - Save Sync: user-guide/save-sync.md
      - Save File Extensions: user-guide/save-file-extensions.md
      - RetroDECK Path Migration: user-guide/retrodeck-path-migration.md
      - Troubleshooting: user-guide/troubleshooting.md
  - Architecture:
      - Backend Architecture: architecture/backend-architecture.md
      - EmuDeck Filesystem Layout: architecture/emudeck-layout.md
      - Save File Sync Architecture: architecture/save-file-sync-architecture.md
      - Config Source Parsers: architecture/config-source-parsers.md
      - Steam Non-Steam Shortcuts: architecture/steam-non-steam-shortcuts.md
      - Steam Remote Play & Cross-Device: architecture/steam-remote-play.md
  - Contributing:
      - Development: contributing/development.md
