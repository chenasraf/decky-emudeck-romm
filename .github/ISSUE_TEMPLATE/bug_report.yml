name: Bug report
description: Report a bug in the plugin
title: "bug: "
labels: ["bug"]
assignees: ["danielcopper"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Numbered steps that reproduce the bug from a known-good state.
      placeholder: |
        1. Open QAM > Decky > RomM Sync
        2. Click "Sync Library"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages verbatim.
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Shown in the QAM panel header, or read from plugin.json.
      placeholder: "0.5.4"
    validations:
      required: true

  - type: input
    id: retrodeck-version
    attributes:
      label: RetroDECK version
      description: Shown in the RetroDECK Configurator, or read from the Flatpak metadata.
      placeholder: "0.9.0b"
    validations:
      required: true

  - type: input
    id: decky-version
    attributes:
      label: Decky Loader version
      description: Shown in the Decky settings panel.
      placeholder: "3.0.5"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log excerpt
      description: |
        Optional. Plugin logs live at `~/homebrew/logs/decky-emudeck-romm/`. Set log level to "debug" in plugin settings for full output. Decky Loader logs are in `~/homebrew/services/PluginLoader/`.
      render: text
    validations:
      required: false
